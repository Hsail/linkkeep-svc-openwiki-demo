name: OpenWiki Update

on:
  workflow_dispatch:
  schedule:
    # GitHub schedules use UTC; 08:00 UTC is midnight PST.
    - cron: "0 8 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      # 实测新增：openwiki code --init/--update 每次运行都会用 dist/code-mode.js 的
      # createCodeModeWorkflow() 无条件重写本文件（issue #282/#316 根因）。只要本文件与该
      # 硬编码模板存在任何字节差异（如本课删掉的 LangSmith 三行），add-paths 就会把这处改动
      # 一并纳入自动 PR 的提交；而"修改 .github/workflows/ 下文件"这件事，GITHUB_TOKEN
      # 天生不被授予该权限（不存在 permissions.workflows 这个可声明的键，首次真跑在此真实
      # 撞上 GitHub 硬限制：remote rejected: refusing to allow a GitHub App to update
      # workflow without `workflows` permission）。官方 examples/openwiki-update.yml 没有
      # 处理这个场景，本课用一个具备 workflow OAuth scope 的 PAT 换掉 checkout / 开PR 两步
      # 默认的 GITHUB_TOKEN 来修复，如实记录进 pitfalls.md（非官方遗漏的批评、是真实边界）。
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          token: ${{ secrets.GH_PAT_WITH_WORKFLOW_SCOPE }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install OpenWiki
        run: npm install --global openwiki

      - name: Run OpenWiki
        # --update also handles the first run for code docs when env vars are set.
        run: openwiki code --update --print
        env:
          # TODO: Replace with your preferred inference provider and model
          OPENWIKI_PROVIDER: openrouter
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENWIKI_MODEL_ID: z-ai/glm-5.2
          # 官方原文另含 LANGSMITH_API_KEY / LANGCHAIN_PROJECT / LANGCHAIN_TRACING_V2 三行，
          # LangSmith 是境外 SaaS 可观测性选配、非必配项，本课不设为硬依赖，故删去（缺 key 时 CLI 显示
          # "LangSmith tracing disabled"、不影响主线，详见 03-case-plan §六）

      - name: Create OpenWiki update pull request
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          token: ${{ secrets.GH_PAT_WITH_WORKFLOW_SCOPE }}
          add-paths: |
            openwiki
            AGENTS.md
            CLAUDE.md
            .github/workflows/openwiki-update.yml
          branch: openwiki/update
          commit-message: "docs: update OpenWiki"
          title: "docs: update OpenWiki"
          body: |
            Automated OpenWiki documentation update.

            This PR was generated by the scheduled OpenWiki workflow.
